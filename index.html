<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img class="image" src="img/macbook.webp" alt="MacBook PRO 16 m1">
        <h2>MacBook PRO 16 M1</h2>
        <h4>Старт продаж</h4>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Asperiores ipsa aliquam error id laborum animi, rem, perferendis necessitatibus odit culpa cum, tenetur alias optio quidem repellat laudantium mollitia atque? Aliquid.</p>
        <div class="countdown">

            <div class="countdown-item">
                <h4 class="days">10</h4>
                <span>дни</span>
            </div>

            <div class="countdown-item">
                <h4 class="hours">18</h4>
                <span>часы</span>
            </div>

            <div class="countdown-item">
                <h4 class="minutes">30</h4>
                <span>минту</span>
            </div>

            <div class="countdown-item">
                <h4 class="seconds">55</h4>
                <span>секунд</span>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
